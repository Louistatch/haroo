# docker-compose.prod.yml pour Haroo
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d

version: '3.8'

services:
  db:
    ports: []  # Ne pas exposer la DB en prod
    restart: always

  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports: []  # Ne pas exposer Redis en prod
    restart: always

  backend:
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: haroo.settings.prod
      DEBUG: "False"
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
    ports: []  # Accessible uniquement via nginx

  celery_worker:
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: haroo.settings.prod

  celery_beat:
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: haroo.settings.prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NGINX_CONF: nginx.prod.conf
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    restart: always

  # Certbot pour renouvellement automatique SSL
  certbot:
    image: certbot/certbot
    container_name: haroo_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    depends_on:
      - frontend

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:
