# docker-compose.yml pour Haroo
# TASK-2.3: Orchestration de tous les services

version: '3.8'

services:
  # Base de données PostgreSQL avec PostGIS
  db:
    image: postgis/postgis:14-3.3
    container_name: haroo_db
    environment:
      POSTGRES_DB: ${DB_NAME:-haroo_db}
      POSTGRES_USER: ${DB_USER:-haroo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-haroo_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_FR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-haroo_user} -d ${DB_NAME:-haroo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - haroo_network

  # Redis pour cache et Celery
  redis:
    image: redis:7-alpine
    container_name: haroo_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - haroo_network

  # Backend Django
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haroo_backend
    command: gunicorn haroo.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-haroo.settings.dev}
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-this-in-production}
      DB_NAME: ${DB_NAME:-haroo_db}
      DB_USER: ${DB_USER:-haroo_user}
      DB_PASSWORD: ${DB_PASSWORD:-haroo_password}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5000}
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - haroo_network

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haroo_celery_worker
    command: celery -A haroo worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-haroo.settings.dev}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-this-in-production}
      DB_NAME: ${DB_NAME:-haroo_db}
      DB_USER: ${DB_USER:-haroo_user}
      DB_PASSWORD: ${DB_PASSWORD:-haroo_password}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
      - backend
    networks:
      - haroo_network

  # Celery Beat (tâches planifiées)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haroo_celery_beat
    command: celery -A haroo beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-haroo.settings.dev}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-this-in-production}
      DB_NAME: ${DB_NAME:-haroo_db}
      DB_USER: ${DB_USER:-haroo_user}
      DB_PASSWORD: ${DB_PASSWORD:-haroo_password}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/3
    volumes:
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
      - backend
    networks:
      - haroo_network

  # Frontend React + Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: haroo_frontend
    ports:
      - "5000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - haroo_network

volumes:
  postgres_data:
  redis_data:

networks:
  haroo_network:
    driver: bridge
