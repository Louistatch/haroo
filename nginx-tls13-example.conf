# Configuration Nginx pour TLS 1.3 - Plateforme Agricole Intelligente du Togo
# 
# Ce fichier fournit un exemple de configuration Nginx pour:
# - Forcer TLS 1.3 uniquement
# - Configurer les ciphers sécurisés
# - Activer HSTS
# - Optimiser les performances SSL/TLS
#
# Exigence 33.1: LA Plateforme DOIT chiffrer toutes les communications avec HTTPS/TLS 1.3

upstream django_app {
    server 127.0.0.1:8000;
    # Pour plusieurs workers:
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name haroo.tg www.haroo.tg;
    
    # Rediriger tout le trafic HTTP vers HTTPS
    return 301 https://$server_name$request_uri;
}

# Configuration HTTPS avec TLS 1.3
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name haroo.tg www.haroo.tg;
    
    # Chemins des certificats SSL
    # Utiliser Let's Encrypt ou un certificat commercial
    ssl_certificate /etc/letsencrypt/live/haroo.tg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/haroo.tg/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/haroo.tg/chain.pem;
    
    # ============================================
    # Configuration TLS 1.3 (Exigence 33.1)
    # ============================================
    
    # Protocoles SSL/TLS - TLS 1.3 uniquement
    ssl_protocols TLSv1.3;
    
    # Ciphers pour TLS 1.3
    # TLS 1.3 utilise des ciphersuites différentes de TLS 1.2
    ssl_ciphers 'TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256';
    ssl_prefer_server_ciphers on;
    
    # Session SSL
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling (améliore la performance)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # ============================================
    # Headers de Sécurité
    # ============================================
    
    # HSTS (HTTP Strict Transport Security)
    # Force les navigateurs à utiliser HTTPS pendant 1 an
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Protection XSS
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Content Security Policy (à adapter selon vos besoins)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    
    # ============================================
    # Configuration Django
    # ============================================
    
    # Taille maximale des uploads (10 MB)
    client_max_body_size 10M;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Logs
    access_log /var/log/nginx/haroo_access.log;
    error_log /var/log/nginx/haroo_error.log;
    
    # Fichiers statiques
    location /static/ {
        alias /var/www/haroo/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Fichiers media (avec sécurité renforcée)
    location /media/ {
        alias /var/www/haroo/media/;
        
        # Empêcher l'exécution de scripts
        location ~ \.(php|py|pl|sh|cgi)$ {
            deny all;
        }
        
        # Headers de sécurité pour les fichiers
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; style-src 'unsafe-inline';" always;
    }
    
    # Proxy vers Django
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Important pour Django SECURE_PROXY_SSL_HEADER
        proxy_set_header X-Forwarded-Proto https;
        
        # WebSocket support (si nécessaire pour notifications temps réel)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Health check endpoint
    location /health/ {
        access_log off;
        proxy_pass http://django_app;
    }
    
    # Bloquer l'accès aux fichiers sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================
# Configuration Supplémentaire
# ============================================

# Limiter les requêtes pour prévenir les attaques DDoS
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Appliquer les limites sur les endpoints sensibles
# À ajouter dans le bloc location approprié:
# location /api/v1/auth/login {
#     limit_req zone=login_limit burst=3 nodelay;
#     proxy_pass http://django_app;
# }

# ============================================
# Notes de Déploiement
# ============================================

# 1. Installer Nginx avec support TLS 1.3:
#    sudo apt update
#    sudo apt install nginx
#    nginx -V  # Vérifier que TLS 1.3 est supporté
#
# 2. Obtenir un certificat SSL avec Let's Encrypt:
#    sudo apt install certbot python3-certbot-nginx
#    sudo certbot --nginx -d haroo.tg -d www.haroo.tg
#
# 3. Tester la configuration:
#    sudo nginx -t
#
# 4. Recharger Nginx:
#    sudo systemctl reload nginx
#
# 5. Vérifier TLS 1.3:
#    openssl s_client -connect haroo.tg:443 -tls1_3
#    curl -I https://haroo.tg
#
# 6. Tester la sécurité SSL:
#    https://www.ssllabs.com/ssltest/analyze.html?d=haroo.tg
#
# 7. Renouvellement automatique Let's Encrypt:
#    sudo certbot renew --dry-run
#    # Ajouter au crontab: 0 0 * * * certbot renew --quiet

# ============================================
# Compatibilité TLS 1.2 (si nécessaire)
# ============================================

# Si vous devez supporter TLS 1.2 pour des clients plus anciens,
# modifiez la ligne ssl_protocols:
#
# ssl_protocols TLSv1.2 TLSv1.3;
# ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256';
#
# Note: L'exigence 33.1 spécifie TLS 1.3 uniquement
