# =============================================================================
# TASK-10.2: Configuration Nginx SSL/TLS pour Haroo Production
#
# Prérequis:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot certonly --standalone -d haroo.tg -d www.haroo.tg
#
# Renouvellement auto (crontab):
#   0 3 * * * certbot renew --quiet --post-hook "nginx -s reload"
# =============================================================================

# Rate limiting zones (inclure nginx-rate-limit.conf ou définir ici)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=100r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name haroo.tg www.haroo.tg;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name haroo.tg www.haroo.tg;

    # --- SSL Certificates ---
    ssl_certificate /etc/letsencrypt/live/haroo.tg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/haroo.tg/privkey.pem;

    # --- SSL Configuration (TLS 1.2 + 1.3 only) ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # --- OCSP Stapling ---
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/haroo.tg/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://sentry.io;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    # --- Rate Limiting ---
    limit_conn conn_limit 10;
    limit_req zone=global_limit burst=20 nodelay;

    # --- Logs ---
    access_log /var/log/nginx/haroo_access.log;
    error_log /var/log/nginx/haroo_error.log;

    # --- Auth endpoints (strict rate limiting) ---
    location ~ ^/api/v1/auth/(login|register|verify) {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # --- API endpoints ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # --- Admin ---
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Health check (no rate limit) ---
    location /api/v1/health/ {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }

    # --- Static files ---
    location /static/ {
        alias /opt/haroo/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Media files ---
    location /media/ {
        alias /opt/haroo/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Frontend (SPA) ---
    root /opt/haroo/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Error pages ---
    error_page 429 /429.html;
    location = /429.html {
        root /opt/haroo/nginx;
        internal;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
