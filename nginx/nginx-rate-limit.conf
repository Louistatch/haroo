# Configuration Nginx avec Rate Limiting
# À utiliser en production pour protéger l'API contre les abus

# Définir les zones de rate limiting
# Zone pour les endpoints d'authentification (très restrictif)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# Zone pour les endpoints API généraux
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Zone pour les endpoints de paiement
limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=2r/m;

# Zone globale pour tout le site
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=100r/m;

# Limiter les connexions simultanées par IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Bloquer les user agents suspects
map $http_user_agent $blocked_agent {
    default 0;
    ~*bot 1;
    ~*crawler 1;
    ~*spider 1;
    ~*scraper 1;
    ~*masscan 1;
    ~*nmap 1;
    ~*nikto 1;
    ~*sqlmap 1;
    ~*curl 1;
    ~*wget 1;
    ~*python-requests 1;
}

# Configuration du serveur
server {
    listen 80;
    server_name haroo.tg www.haroo.tg;
    
    # Redirection HTTPS (à activer en production)
    # return 301 https://$server_name$request_uri;
    
    # Logs
    access_log /var/log/nginx/haroo_access.log;
    error_log /var/log/nginx/haroo_error.log;
    
    # Bloquer les user agents suspects
    if ($blocked_agent) {
        return 403;
    }
    
    # Limiter les connexions simultanées (max 10 par IP)
    limit_conn conn_limit 10;
    
    # Rate limiting global
    limit_req zone=global_limit burst=20 nodelay;
    
    # Headers de sécurité
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Désactiver les méthodes HTTP non utilisées
    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 405;
    }
    
    # Endpoints d'authentification (très restrictif)
    location ~ ^/api/v1/auth/(login|register|verify-sms) {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_req_status 429;
        
        # Headers de rate limiting
        add_header X-RateLimit-Limit "5 per minute" always;
        
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # Endpoints de paiement (très restrictif)
    location ~ ^/api/v1/(payments|transactions) {
        limit_req zone=payment_limit burst=1 nodelay;
        limit_req_status 429;
        
        # Headers de rate limiting
        add_header X-RateLimit-Limit "2 per minute" always;
        
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts plus longs pour les paiements
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Endpoints API généraux
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        
        # Headers de rate limiting
        add_header X-RateLimit-Limit "10 per second" always;
        
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # Admin Django (pas de rate limiting strict)
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Fichiers media
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    
    # Fichiers statiques
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Frontend (SPA)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        
        # Cache des assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Health check (pas de rate limiting)
    location /api/v1/health/ {
        proxy_pass http://backend:8000;
        access_log off;
    }
    
    # Page d'erreur personnalisée pour 429
    error_page 429 /429.html;
    location = /429.html {
        root /usr/share/nginx/html;
        internal;
    }
}

